version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  celery:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: celery -A execution.celery_app worker --loglevel=info
    env_file:
      - ../.env
    depends_on:
      - redis
    working_dir: /app