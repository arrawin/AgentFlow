version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - default

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - agentflow_internal   # reachable from sandbox containers

  celery:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: celery -A execution.celery_app worker --loglevel=info
    env_file:
      - ../.env
    depends_on:
      - redis
    working_dir: /app
    volumes:
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock  # to spawn run_python containers
    networks:
      - default
      - agentflow_internal

  celery_beat:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: celery -A execution.celery_app beat --loglevel=info
    env_file:
      - ../.env
    depends_on:
      - redis
    working_dir: /app
    volumes:
      - uploads_data:/app/uploads
    networks:
      - default

networks:
  default:
    driver: bridge
  agentflow_internal:
    driver: bridge
    internal: true   # no internet access — containers can only reach backend

volumes:
  uploads_data:
